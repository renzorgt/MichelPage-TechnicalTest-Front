<div class="modal-header">
    <h2 mat-dialog-title>Usuarios Registrados</h2>
    <button mat-icon-button (click)="close()" matTooltip="Cerrar">
        <mat-icon>close</mat-icon>
    </button>
</div>

<mat-dialog-content class="modal-body">
    @if (loading) {
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
    }

    <div class="mat-elevation-z4">
        <div class="table-responsive">
            <table mat-table [dataSource]="dataSource">

                <ng-container matColumnDef="id">
                    <th mat-header-cell *matHeaderCellDef>No.</th>
                    <td mat-cell *matCellDef="let row">{{ row.id }}</td>
                </ng-container>

                <ng-container matColumnDef="nombre">
                    <th mat-header-cell *matHeaderCellDef>Nombre</th>
                    <td mat-cell *matCellDef="let row">{{ row.nombre }}</td>
                </ng-container>

                <ng-container matColumnDef="email">
                    <th mat-header-cell *matHeaderCellDef>Correo</th>
                    <td mat-cell *matCellDef="let row">{{ row.email }}</td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

                <tr class="mat-row" *matNoDataRow>
                    <td class="mat-cell" colspan="3">No hay usuarios registrados.</td>
                </tr>
            </table>
        </div>
        <mat-paginator style="background-color: rgb(223, 223, 223);"
            [pageSizeOptions]="[5, 10, 25]"
            aria-label="Seleccionar página">
        </mat-paginator>
    </div>
</mat-dialog-content>

<mat-dialog-actions align="end" style="padding: 8px 24px 16px;">
    <button mat-button (click)="close()">Cerrar</button>
</mat-dialog-actions>
