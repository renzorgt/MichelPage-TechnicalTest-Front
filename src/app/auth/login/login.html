<div class="login-wrapper">

  <mat-card class="login-card">
    <mat-card-header class="card-header">
      <mat-card-title>Iniciar sesión</mat-card-title>
      <mat-card-subtitle>Accede a tu cuenta para continuar</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form" novalidate>

        <!-- Email -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Correo electrónico</mat-label>
          <input matInput id="email" type="email" formControlName="email" placeholder="tucorreo@ejemplo.com"
            autocomplete="email" />
          <mat-icon matPrefix>email</mat-icon>
          @if (loginForm.get('email')?.touched) {
          <mat-error>{{ emailError }}</mat-error>
          }
        </mat-form-field>

        <!-- Password -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput id="password" [type]="hidePassword ? 'password' : 'text'" formControlName="password"
            placeholder="••••••••" autocomplete="current-password" />
          <mat-icon matPrefix>lock</mat-icon>
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword"
            [attr.aria-label]="hidePassword ? 'Mostrar contraseña' : 'Ocultar contraseña'">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          @if (loginForm.get('password')?.touched) {
          <mat-error>{{ passwordError }}</mat-error>
          }
        </mat-form-field>

        <!-- Submit -->
        <button mat-flat-button id="login-submit-btn" type="submit" [disabled]="isLoading">
          @if (isLoading) {
          <mat-spinner diameter="20" class="btn-spinner"></mat-spinner>
          <span>Cargando...</span>
          } @else {
          <span>Ingresar</span>
          }
        </button>

      </form>
    </mat-card-content>
  </mat-card>

</div>
